services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: delivery_app
      POSTGRES_PASSWORD: delivery_pass
      POSTGRES_DB: delivery_ops
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - delivery_pg_data:/var/lib/postgresql/data
      - ./init_database.sql:/docker-entrypoint-initdb.d/init_database.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U delivery_app -d delivery_ops"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - delivery_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  delivery_pg_data:
  delivery_redis_data:

